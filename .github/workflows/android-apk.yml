name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:  # Permite triggear manual desde GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        env:
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: panda-proof-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build release AAB (Play Store)
        working-directory: android
        run: ./gradlew bundleRelease
        continue-on-error: true  # Sin keystore, esto puede fallar - es esperado

      - name: Upload AAB (si se generó)
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: panda-proof-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
        continue-on-error: true
