<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA Core -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#070812" />

    <!-- iOS / iPhone PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Panda AdLab" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />

    <!-- SEO / Share -->
    <title>Panda AdLab — Director Creativo IA</title>
    <meta name="description" content="Panda AdLab — by Color Panda Media Lab. Analiza tu anuncio. Mejora tu diseño. Crea campañas que venden." />

    <!-- Open Graph / Twitter -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Panda AdLab — Director Creativo IA" />
    <meta property="og:description" content="De arte bonito a anuncio efectivo. Panda AdLab analiza tu diseño y crea campañas que venden, by Color Panda Media Lab." />
    <meta property="og:image" content="/icon-512.png" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Format detection (avoid auto phone-link in iOS) -->
    <meta name="format-detection" content="telephone=no" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Safe area insets + mobile polish -->
    <style>
      :root {
        --sat: env(safe-area-inset-top);
        --sab: env(safe-area-inset-bottom);
        --sal: env(safe-area-inset-left);
        --sar: env(safe-area-inset-right);
      }
      html, body {
        overflow-x: hidden;
        max-width: 100vw;
        /* CRÍTICO Samsung: permite tap+scroll vertical sin pelearse con gestos del sistema */
        touch-action: pan-y;
      }
      html {
        -webkit-text-size-adjust: 100%;
        -webkit-tap-highlight-color: transparent;
        text-size-adjust: 100%;
      }
      body {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
        background: #070812;
        /* Permite pull-to-refresh y bounce normal en Android — `none` rompía taps en Samsung */
        overscroll-behavior-y: auto;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      /* Asegura que ninguna imagen se salga del contenedor */
      img, video, canvas { max-width: 100%; height: auto; }
      /* iOS: prevent input zoom (font-size >= 16px) */
      input, select, textarea {
        font-size: 16px !important;
      }
      /* Hide scrollbar utility for nav pills */
      .scrollbar-none::-webkit-scrollbar { display: none; }
      .scrollbar-none { -ms-overflow-style: none; scrollbar-width: none; }
      /* Prevent text selection on UI chrome (logo, buttons emojis) */
      button, [role="button"] { -webkit-user-select: none; user-select: none; }
      /* CRÍTICO Samsung Galaxy: elimina delay de 300ms y soluciona taps no registrados.
         `manipulation` permite scroll + tap pero desactiva double-tap zoom y gestos extra
         que en Samsung Internet/Chrome interferían con los onClick de React. */
      button, [role="button"], a, [onclick], .cursor-pointer, input[type="button"], input[type="submit"], label {
        touch-action: manipulation;
        -webkit-touch-callout: none;
      }
      /* Garantiza que ningún elemento bloquee taps por error de capas */
      button, a, [role="button"] {
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Register Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(() => console.log('🐼 SW registrado'))
            .catch(console.error);
        });
      }
    </script>
  </body>
</html>
